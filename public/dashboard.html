<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkly | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --surface-2: #f8f9fd;
            --text: #111827;
            --muted: #5f677b;
            --line: #dbe2ee;
            --brand: #0f766e;
            --brand-2: #155e75;
            --shadow: 0 18px 44px rgba(15, 23, 42, 0.07);
            --radius: 12px;
        }
        [data-theme="dark"] {
            --bg: #0b1220;
            --surface: #111a2f;
            --surface-2: #16213b;
            --text: #e6edf8;
            --muted: #9fb0cd;
            --line: #253557;
            --brand: #14b8a6;
            --brand-2: #06b6d4;
            --shadow: 0 18px 44px rgba(2, 6, 23, 0.45);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Plus Jakarta Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 0% -10%, #d1fae5 0%, transparent 35%),
                radial-gradient(circle at 100% 0%, #cffafe 0%, transparent 30%),
                var(--bg);
            min-height: 100vh;
        }

        .wrap {
            width: min(1160px, 92vw);
            margin: 28px auto 36px;
        }

        .topbar {
            background: rgba(255,255,255,0.92);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .brand { font-weight: 800; }
        .top-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .theme-toggle { min-width: 92px; }

        .btn {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            border-radius: 10px;
            font: inherit;
            padding: 9px 12px;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: #fff;
            border-color: transparent;
        }

        .stats {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .stat-card { padding: 14px; }
        .stat-label { font-size: 0.83rem; color: var(--muted); }
        .stat-value { margin-top: 6px; font-size: 1.45rem; font-weight: 800; }

        .panel {
            margin-top: 14px;
            padding: 14px;
        }
        .sparkline-card {
            margin-top: 14px;
            padding: 14px;
        }
        .sparkline-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }
        .sparkline-title {
            font-size: 0.92rem;
            color: var(--muted);
            font-weight: 600;
        }
        .sparkline-value {
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 700;
        }
        .sparkline {
            width: 100%;
            height: 90px;
            border-radius: 10px;
            background: var(--surface-2);
            border: 1px solid var(--line);
            display: block;
        }

        .controls {
            display: grid;
            grid-template-columns: 1.1fr auto auto;
            gap: 10px;
            align-items: center;
        }
        .search {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--surface-2);
            font: inherit;
        }
        .filters {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .chip {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 0.84rem;
            cursor: pointer;
        }
        .chip.active {
            background: #ccfbf1;
            border-color: #5eead4;
            color: #0f766e;
            font-weight: 700;
        }

        .status-row {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .table-wrap {
            margin-top: 10px;
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 860px;
            background: #fff;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
        }
        th {
            background: #f1f5f9;
            font-size: 0.85rem;
            color: #334155;
            font-weight: 700;
        }
        .url-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--muted);
            font-size: 0.88rem;
        }
        .short-link {
            color: #0f766e;
            font-weight: 700;
            text-decoration: none;
        }
        .badge {
            display: inline-block;
            background: #e2e8f0;
            color: #0f172a;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .row-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tiny {
            padding: 6px 9px;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .empty {
            padding: 16px;
            color: var(--muted);
            text-align: center;
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.45);
            z-index: 10;
            padding: 14px;
        }
        .modal.open { display: flex; }
        .modal-box {
            width: min(420px, 100%);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 14px;
        }
        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        #qrcode-container {
            background: #fff;
            border-radius: 10px;
            border: 1px solid var(--line);
            padding: 12px;
            display: inline-block;
        }

        .toast {
            position: fixed;
            right: 16px;
            bottom: 16px;
            background: #0f172a;
            color: #f8fafc;
            padding: 10px 12px;
            border-radius: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.2s ease;
            pointer-events: none;
            z-index: 20;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 920px) {
            .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="topbar card">
            <div class="brand">Linkly Dashboard</div>
            <div class="top-actions">
                <button id="themeToggleBtn" class="btn theme-toggle" type="button">Dark</button>
                <button id="backBtn" class="btn">Back to Shortener</button>
                <button id="logoutBtn" class="btn btn-primary">Logout</button>
            </div>
        </header>

        <section class="stats">
            <div class="card stat-card">
                <div class="stat-label">Total Links</div>
                <div class="stat-value" id="totalLinks">0</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">Total Clicks</div>
                <div class="stat-value" id="totalClicks">0</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">Top Link Clicks</div>
                <div class="stat-value" id="topClicks">0</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">Created in Filter</div>
                <div class="stat-value" id="filteredLinks">0</div>
            </div>
        </section>

        <section class="card sparkline-card">
            <div class="sparkline-head">
                <div class="sparkline-title">Clicks Trend (Latest 12 Links)</div>
                <div id="sparklineSummary" class="sparkline-value">No data</div>
            </div>
            <svg id="clicksSparkline" class="sparkline" viewBox="0 0 360 90" preserveAspectRatio="none" aria-label="Clicks trend chart"></svg>
        </section>

        <section class="panel card">
            <div class="controls">
                <input id="searchInput" class="search" type="text" placeholder="Search by short code or original URL">
                <div class="filters">
                    <button class="chip active" data-filter="all">All</button>
                    <button class="chip" data-filter="7d">7d</button>
                    <button class="chip" data-filter="30d">30d</button>
                </div>
                <button id="refreshBtn" class="btn">Refresh</button>
            </div>
            <div id="statusRow" class="status-row">Loading your links...</div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Original URL</th>
                            <th>Short Link</th>
                            <th>Clicks</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTbody"></tbody>
                </table>
            </div>
            <div id="emptyState" class="empty" style="display:none;">No links found for this filter.</div>
        </section>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-box">
            <div class="modal-head">
                <strong>QR Code</strong>
                <button id="closeModalBtn" class="btn tiny">Close</button>
            </div>
            <div id="qrcode-container"></div>
            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
                <button id="copyModalLinkBtn" class="btn tiny">Copy Link</button>
                <button id="downloadQrBtn" class="btn tiny">Download QR</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDRuTdgt9l5KEcGNEdXadm0FXRUndPsWAE",
            authDomain: "linkly-project-43464.firebaseapp.com",
            projectId: "linkly-project-43464",
            storageBucket: "linkly-project-43464.firebasestorage.app",
            messagingSenderId: "289406240228",
            appId: "1:289406240228:web:4b7e82d2a51089e8fbf3f1",
            measurementId: "G-CPNES7BTDN"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        const linksTbody = document.getElementById("linksTbody");
        const statusRow = document.getElementById("statusRow");
        const emptyState = document.getElementById("emptyState");
        const searchInput = document.getElementById("searchInput");
        const refreshBtn = document.getElementById("refreshBtn");
        const chips = Array.from(document.querySelectorAll(".chip"));
        const totalLinksEl = document.getElementById("totalLinks");
        const totalClicksEl = document.getElementById("totalClicks");
        const topClicksEl = document.getElementById("topClicks");
        const filteredLinksEl = document.getElementById("filteredLinks");
        const qrModal = document.getElementById("qrModal");
        const qrContainer = document.getElementById("qrcode-container");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const copyModalLinkBtn = document.getElementById("copyModalLinkBtn");
        const downloadQrBtn = document.getElementById("downloadQrBtn");
        const toast = document.getElementById("toast");
        const backBtn = document.getElementById("backBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const themeToggleBtn = document.getElementById("themeToggleBtn");
        const clicksSparkline = document.getElementById("clicksSparkline");
        const sparklineSummary = document.getElementById("sparklineSummary");

        let allLinks = [];
        let currentFilter = "all";
        let currentQrUrl = "";
        let toastTimer = null;
        const THEME_KEY = "linkly_theme";

        function applyTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            themeToggleBtn.textContent = theme === "dark" ? "Light" : "Dark";
        }

        applyTheme(localStorage.getItem(THEME_KEY) || "light");

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add("show");
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove("show"), 1700);
        }

        function formatDate(input) {
            if (!input) return "-";
            const d = new Date(input);
            if (Number.isNaN(d.getTime())) return "-";
            return d.toLocaleDateString();
        }

        function daysAgo(input) {
            if (!input) return 9999;
            const d = new Date(input);
            if (Number.isNaN(d.getTime())) return 9999;
            const diff = Date.now() - d.getTime();
            return diff / (1000 * 60 * 60 * 24);
        }

        function applyFilters() {
            const q = searchInput.value.trim().toLowerCase();
            let filtered = [...allLinks];

            if (currentFilter === "7d") {
                filtered = filtered.filter((l) => daysAgo(l.createdAt) <= 7);
            } else if (currentFilter === "30d") {
                filtered = filtered.filter((l) => daysAgo(l.createdAt) <= 30);
            }

            if (q) {
                filtered = filtered.filter((l) =>
                    (l.originalUrl || "").toLowerCase().includes(q) ||
                    (l.shortCode || "").toLowerCase().includes(q)
                );
            }

            renderTable(filtered);
            renderStats(filtered);
            statusRow.textContent = `Showing ${filtered.length} of ${allLinks.length} links`;
        }

        function renderStats(filtered) {
            const totalClicks = allLinks.reduce((sum, l) => sum + (Number(l.clickCount) || 0), 0);
            const topClicks = allLinks.reduce((m, l) => Math.max(m, Number(l.clickCount) || 0), 0);
            totalLinksEl.textContent = String(allLinks.length);
            totalClicksEl.textContent = String(totalClicks);
            topClicksEl.textContent = String(topClicks);
            filteredLinksEl.textContent = String(filtered.length);
            renderSparkline(allLinks);
        }

        function renderSparkline(links) {
            const values = links
                .slice(0, 12)
                .map((l) => Number(l.clickCount) || 0)
                .reverse();

            if (!values.length) {
                clicksSparkline.innerHTML = "";
                sparklineSummary.textContent = "No data";
                return;
            }

            const width = 360;
            const height = 90;
            const pad = 10;
            const maxValue = Math.max(...values, 1);
            const stepX = values.length > 1 ? (width - pad * 2) / (values.length - 1) : 0;

            const points = values.map((v, i) => {
                const x = pad + i * stepX;
                const y = height - pad - (v / maxValue) * (height - pad * 2);
                return `${x},${y}`;
            }).join(" ");

            const areaPoints = `${pad},${height - pad} ${points} ${width - pad},${height - pad}`;
            clicksSparkline.innerHTML = `
                <polyline points="${areaPoints}" fill="rgba(20,184,166,0.18)" stroke="none"></polyline>
                <polyline points="${points}" fill="none" stroke="url(#lineGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
                <defs>
                    <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#14b8a6"></stop>
                        <stop offset="100%" stop-color="#06b6d4"></stop>
                    </linearGradient>
                </defs>
            `;

            sparklineSummary.textContent = `Max ${maxValue} clicks`;
        }

        function renderTable(links) {
            linksTbody.innerHTML = "";
            emptyState.style.display = links.length ? "none" : "block";

            links.forEach((link) => {
                const tr = document.createElement("tr");
                const short = `${window.location.origin}/${link.shortCode}`;
                tr.innerHTML = `
                    <td class="url-cell" title="${link.originalUrl}">${link.originalUrl}</td>
                    <td><a class="short-link" href="${short}" target="_blank" rel="noopener noreferrer">${short}</a></td>
                    <td><span class="badge">${link.clickCount || 0}</span></td>
                    <td>${formatDate(link.createdAt)}</td>
                    <td>
                        <div class="row-actions">
                            <button class="btn tiny copy-btn" data-url="${short}">Copy</button>
                            <button class="btn tiny qr-btn" data-url="${short}">QR</button>
                            <a class="btn tiny" href="${short}" target="_blank" rel="noopener noreferrer">Open</a>
                        </div>
                    </td>
                `;
                linksTbody.appendChild(tr);
            });
        }

        async function fetchUserLinks(user) {
            statusRow.textContent = "Loading your links...";
            try {
                const idToken = await user.getIdToken(true);
                const response = await fetch("/api/links", {
                    headers: { Authorization: `Bearer ${idToken}` }
                });

                if (!response.ok) {
                    throw new Error(`Failed with status ${response.status}`);
                }

                allLinks = await response.json();
                applyFilters();
            } catch (error) {
                console.error("Error fetching links:", error);
                statusRow.textContent = "Could not load links.";
                renderTable([]);
                renderStats([]);
            }
        }

        function openQr(url) {
            currentQrUrl = url;
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: url, width: 220, height: 220 });
            qrModal.classList.add("open");
        }

        function downloadQr() {
            const img = qrContainer.querySelector("img");
            const canvas = qrContainer.querySelector("canvas");
            const src = img ? img.src : (canvas ? canvas.toDataURL("image/png") : "");
            if (!src) return;
            const a = document.createElement("a");
            a.href = src;
            a.download = "linkly-qr.png";
            a.click();
        }

        linksTbody.addEventListener("click", async (e) => {
            const target = e.target;
            if (target.classList.contains("copy-btn")) {
                await navigator.clipboard.writeText(target.dataset.url || "");
                showToast("Copied link");
            }
            if (target.classList.contains("qr-btn")) {
                openQr(target.dataset.url || "");
            }
        });

        searchInput.addEventListener("input", applyFilters);
        chips.forEach((chip) => {
            chip.addEventListener("click", () => {
                chips.forEach((c) => c.classList.remove("active"));
                chip.classList.add("active");
                currentFilter = chip.dataset.filter;
                applyFilters();
            });
        });

        refreshBtn.addEventListener("click", async () => {
            const user = auth.currentUser;
            if (user) await fetchUserLinks(user);
        });

        closeModalBtn.addEventListener("click", () => qrModal.classList.remove("open"));
        qrModal.addEventListener("click", (e) => {
            if (e.target === qrModal) qrModal.classList.remove("open");
        });
        copyModalLinkBtn.addEventListener("click", async () => {
            if (!currentQrUrl) return;
            await navigator.clipboard.writeText(currentQrUrl);
            showToast("Copied link");
        });
        downloadQrBtn.addEventListener("click", downloadQr);

        backBtn.addEventListener("click", () => window.location.href = "/");
        logoutBtn.addEventListener("click", async () => {
            await auth.signOut();
            window.location.href = "/";
        });
        themeToggleBtn.addEventListener("click", () => {
            const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
            localStorage.setItem(THEME_KEY, next);
            applyTheme(next);
        });

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "/";
                return;
            }
            await fetchUserLinks(user);
        });
    </script>
</body>
</html>
